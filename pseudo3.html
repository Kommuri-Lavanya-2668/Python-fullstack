<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <style>
        li {
            list-style-type: lower-roman;
        }
        li:nth-child(3) {
            color:yellow;
        }

        li:first-child {
            color: blueviolet;
        }

        li:last-child {
            color: aqua;
        }

    </style>
</head>
<body>
    <ul>
        <li>one</li>
        <li>two</li>
        <li>three</li>
        <li>four</li>
    </ul>
    
</body>
</html>
