<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        * {
            margin: 0px;
        }

        header {
            height: 200px;
            background-color:#E89951;
        }

        nav {
            height: 100px;
            background-color:#F5788B;
        }
        main {
            background-color: aquamarine;
            height: 100%;
            width: 100%;
            display: flex;
        }

        main > .child1 .article {
            background-color: blueviolet;
            height: 50%;
            width: 30%;
        
        }

        main > .child1 .section{
            height: 100%;
            width: 90%;
            background-color:#FF6A1C;
            
        }

        main > .child2 > aside {
            background-color: #760031;
            width: 200%;
            height: 100%;
        }
        footer {
            height: 100px;
            background-color: #767F9E;
        }

        .header,nav,section,article,aside,footer {
            display: flex;
            justify-content: center;
            align-items: center;
            border: bold;
    

        }

    </style>
    
    <title>Semantic Tags</title>
</head>
<body>
    <header><h1>Header</h1></header>
    <nav><h1>Navigation</h1></nav>
    <main>
        <div class="child1">
            <section><h1>Section</h1></section>
            <article><h1>Article</h1></article>
        </div>
        <div class="child2">
            <aside><h1>Aside</h1></aside>
        </div>
    </main>
    <footer>Footer</footer>
    
</body>
</html>
