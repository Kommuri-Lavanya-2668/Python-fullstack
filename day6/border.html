<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      h1 {
        border: 10px;
        border-color: red;
        border-style: solid;
        text-align: center;
        display: inline;
      }
      h1#dashed {
        border: 5px dotted blueviolet;
      }
      h2#padding {
        display: inline;
        border: 5px solid red;
        padding: 5px 15px 25px 50px;
      }
    </style>
  </head>

  <body>
    <h1>Lavanya</h1>
    <h1 id="dashed">DASHED</h1>
    <br />
    <br />
    <br />
    <h2 id="padding">PADDING</h2>
  </body>
</html>
