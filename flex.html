<!DOCTYPE html>
<html lang="en">
<head>
    <title>flex</title>
    <style>
        .parent {
            background-color: black;
            height: 600px;
            width: 600px;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
        }

        .parent > div {
            height: 150px;
            width: 150px;
            font-size: 100px;
        }    

        .child1 {
            background-color: red;
            order: 1; 

        }

        .child2 {
            background-color: green;
            order: 3;
            align-self: end;
        }
        .child3 {
            background-color: blue;
            order: 2;
            align-self: start;
        }


    </style>
</head>
<body>
    <div class="parent">
        <div class="child1">1</div>
        <div class="child2">2</div>
        <div class="child3">3</div>
    </div>
    
</body>
</html>
