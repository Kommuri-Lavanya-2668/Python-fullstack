<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>List's</title>
</head>
<body>
    <h2>Ordered List</h2>
    <ol>
        <li>One</li>
        <li>Two</li>
        <li>Three</li>
        <li>Four</li>
        
    </ol>
    <h2>UnOrdered List</h2>
    <ul>
        <li>Apple</li>
        <li>Cirtus</li>
        <li>Mango</li>
    </ul>
</body>
</html>
