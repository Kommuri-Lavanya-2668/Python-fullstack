<!DOCTYPE html>
<html lang="en">
<head>
    <title>Psuedo selector</title>
    <style>
        a {
            text-decoration: none;
        }
        a:hover {
            background-color: black;
            font-weight: bold;
            color:green;
        }
        a.visted {
            color:red;

        }
        a.active {
            color:blue;
            background-color: yellow;
        }

        h1:hover {
            background-color: black;
            color: white;
            font-size: 100px;
        }

    </style>
</head>
<body>
    <a href="https://youtube.com">Click Me</a>
    <h1>Anantha</h1>
    
</body>
</html>
